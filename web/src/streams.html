<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>FMHY Downloader — Streams</title>
		<link rel="stylesheet" href="/third-party/bootstrap/css/bootstrap.min.css">
		<link rel="stylesheet" href="style.css">
		<script src="/third-party/bootstrap/js/bootstrap.bundle.min.js" defer></script>
		<script src="components/sidebar.js" defer></script>
		<script src="app.js" defer></script>
	</head>
	<body data-page="streams">
		<div class="d-flex" id="app">
			<component-sidebar></component-sidebar>

			<main id="main-content" class="flex-grow-1 overflow-auto p-4">
				<h2 class="mb-1">Streams</h2>
				<p class="text-muted small mb-4" id="streams-source"></p>

				<div id="streams-empty" class="text-muted d-none">
					No streams found. Use <a href="search.html">Search</a> to retrieve streams first.
				</div>

				<div id="streams-table-wrap" class="d-none">
					<table class="table table-hover align-middle">
						<thead class="table-dark">
							<tr>
								<th scope="col">#</th>
								<th scope="col">Resolution</th>
								<th scope="col">Type</th>
								<th scope="col">Segments</th>
								<th scope="col"></th>
							</tr>
						</thead>
						<tbody id="streams-tbody"></tbody>
					</table>
				</div>
			</main>
		</div>

		<!-- Download modal -->
		<div class="modal fade" id="modal-download" tabindex="-1" aria-labelledby="modal-download-title" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="modal-download-title">Download Stream</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<p class="text-muted small mb-3" id="modal-stream-info"></p>
						<label class="form-label" for="download-filename">Output filename</label>
						<div class="input-group">
							<span class="input-group-text text-muted">/output/</span>
							<input type="text" class="form-control" id="download-filename" placeholder="video.ts">
						</div>
						<div id="download-error" class="text-danger mt-2 d-none"></div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
						<button type="button" class="btn btn-success" id="btn-confirm-download">Start Download</button>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
