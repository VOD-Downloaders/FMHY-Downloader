<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Downloader</title>
        <style>
            body { font-family: sans-serif; max-width: 480px; margin: 60px auto; padding: 0 1rem; }
            label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
            input { width: 100%; box-sizing: border-box; padding: 8px 10px; font-size: 14px;
                    border: 1px solid #ccc; border-radius: 6px; margin-bottom: 14px; }
            input:focus { outline: none; border-color: #1D9E75; }
            button { padding: 9px 20px; background: #1D9E75; color: #fff; border: none;
                     border-radius: 6px; font-size: 14px; cursor: pointer; }
            button:disabled { opacity: 0.5; cursor: not-allowed; }
            #status { margin-top: 14px; font-size: 13px; color: #555; min-height: 20px; }
            #status.error { color: #c0392b; }
            #status.ok { color: #1D9E75; }
        </style>
    </head>
    <body>
        <h2>Download file</h2>

        <label for="url-input">URL</label>
        <input id="url-input" type="url" placeholder="https://example.com/file.zip" />

        <label for="name-input">Save as</label>
        <input id="name-input" type="text" placeholder="my-file.zip" />

        <button id="dl-btn">Download</button>
        <p id="status"></p>

        <script src="index.js"></script>
    </body>
</html>
