<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <main>
    <header>
      <div class="wordmark">
        <svg class="wordmark-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v12M5 10l7 7 7-7"/>
          <path d="M3 21h18"/>
        </svg>
        Downloader
      </div>
      <div id="health-dot" class="health-dot" title="Server status"></div>
    </header>

    <!-- ── Form Card ─────────────────────────────────────── -->
    <section class="card" id="form-card">
      <div class="card-eyebrow">
        <span class="chip">01</span>
        <span class="card-title">New Download</span>
      </div>

      <div class="field">
        <label for="indexer-select">Indexer</label>
        <div class="select-wrap">
          <select id="indexer-select" disabled>
            <option value="">Loading indexers…</option>
          </select>
          <svg class="select-arrow" viewBox="0 0 10 6" fill="none">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <label for="url-input">Source URL</label>
        <input id="url-input" type="url" placeholder="https://example.com/file.zip" autocomplete="off" spellcheck="false" />
      </div>

      <div class="field">
        <label for="name-input">Output path</label>
        <input id="name-input" type="text" placeholder="/downloads/file.zip" autocomplete="off" spellcheck="false" />
      </div>

      <div class="form-footer">
        <button id="dl-btn" disabled>
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 1v8M3 6l4 4 4-4M1 12h12"/>
          </svg>
          Download
        </button>
        <p id="form-status" aria-live="polite"></p>
      </div>
    </section>

    <!-- ── Queue Card ─────────────────────────────────────── -->
    <section class="card" id="queue-card">
      <div class="card-eyebrow">
        <span class="chip">02</span>
        <span class="card-title">Queue</span>
        <span class="queue-meta" id="queue-meta" hidden></span>
        <button class="clear-btn" id="clear-btn" hidden>Clear done</button>
      </div>
      <div id="downloads-list">
        <p class="empty-state">Queue is empty.</p>
      </div>
    </section>
  </main>
  <script src="index.js"></script>
</body>
</html>
