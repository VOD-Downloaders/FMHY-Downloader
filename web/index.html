<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Downloader</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h2>Download file</h2>

        <label for="url-input">URL</label>
        <input id="url-input" type="url" placeholder="https://example.com/file.zip" />

        <label for="name-input">Save as</label>
        <input id="name-input" type="text" placeholder="my-file.zip" />

        <button id="dl-btn">Download</button>
        <p id="status"></p>

        <script src="index.js"></script>
    </body>
</html>
