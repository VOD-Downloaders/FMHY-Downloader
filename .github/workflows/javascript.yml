name: Javascript

on:
  push:
    branches: [ "main", "dev", "feature/**", "fix/**" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  lint-codeql:
    name: Lint (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: javascript-typescript
        build-mode: none

    - name: Analyze code
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:actions"

  lint-eslint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install ESLint
        run: npm install --save-dev eslint @eslint/js globals @microsoft/eslint-formatter-sarif
        working-directory: web

      - name: Run ESLint
        run: npx eslint "**/*.js" --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif
        continue-on-error: true
        working-directory: web

      - name: Upload results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: web/eslint-results.sarif
          wait-for-processing: true
